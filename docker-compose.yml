services:
  motion-reading:
    build:
      context: .
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=${NO_PROXY:-}
    container_name: motion-reading
    ports:
      - "8000:8000"
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/media0:/dev/media0
    group_add:
      - video
    privileged: true
    environment:
      - CAMERA_ID=${CAMERA_ID:-0}
    restart: unless-stopped
